<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reporte de Asignaciones</title>
    <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Modern Premium CSS */
        :root {
            --primary-color: #16B378; /* Ceibal Green */
            --primary-hover: #129664;
            --bg-color: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border-color: #e2e8f0;
            --success: #10b981;
            --danger: #ef4444;
            --warning: #f59e0b;
            --info: #3b82f6;
            --purple: #8b5cf6;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            padding: 24px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header-title {
            font-size: 28px;
            font-weight: 700;
            margin-bottom: 24px;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .header-title i {
            color: var(--primary-color);
        }

        /* KPIs Section */
        .kpi-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .kpi-card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            position: relative;
            overflow: hidden;
        }
        
        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 4px;
            height: 100%;
            background-color: var(--primary-color);
        }
        
        .kpi-card.kpi-success::before { background-color: var(--success); }
        .kpi-card.kpi-danger::before { background-color: var(--danger); }
        .kpi-card.kpi-info::before { background-color: var(--info); }
        .kpi-card.kpi-purple::before { background-color: var(--purple); }

        .kpi-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }

        .kpi-title {
            font-size: 14px;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 12px;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .kpi-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--text-main);
        }

        /* Filters Section */
        .filters-container {
            background: var(--card-bg);
            padding: 24px;
            border-radius: 16px;
            margin-bottom: 32px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            display: flex;
            gap: 20px;
            align-items: flex-end;
        }

        .filter-group {
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .filter-group label {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-muted);
        }

        .filter-group select, .filter-group input {
            padding: 12px 16px;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
            background-color: #f8fafc;
        }

        .filter-group select:focus, .filter-group input:focus {
            border-color: var(--primary-color);
            box-shadow: 0 0 0 3px rgba(22, 179, 120, 0.1);
            background-color: #ffffff;
        }

        .reset-btn {
            padding: 12px 24px;
            background-color: #f1f5f9;
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            height: 44px;
        }

        .reset-btn:hover {
            background-color: #e2e8f0;
            border-color: #cbd5e1;
        }

        /* Table Section */
        .table-container {
            background: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th, td {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-color);
        }

        th {
            background-color: #f8fafc;
            font-weight: 600;
            font-size: 13px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            white-space: nowrap;
        }

        td {
            font-size: 14px;
            color: var(--text-main);
        }

        tr:last-child td {
            border-bottom: none;
        }

        tbody tr:hover {
            background-color: #f8fafc;
        }

        .badge {
            padding: 6px 12px;
            border-radius: 9999px;
            font-size: 12px;
            font-weight: 600;
            display: inline-block;
            text-align: center;
        }
        
        .badge-success { background: #d1fae5; color: #065f46; }
        .badge-danger { background: #fee2e2; color: #991b1b; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        .badge-orange { background: #ffedd5; color: #c2410c; }
        
        /* Row Status Styles */
        tbody tr.row-critical { background-color: #fef2f2; }
        tbody tr.row-critical td:first-child { border-left: 4px solid var(--danger); }
        
        tbody tr.row-recovery { background-color: #fffbeb; }
        tbody tr.row-recovery td:first-child { border-left: 4px solid var(--warning); }
        
        tbody tr.row-alert { background-color: #fff7ed; }
        tbody tr.row-alert td:first-child { border-left: 4px solid #f97316; }
        
        tbody tr.row-ok { background-color: #f0fdf4; }
        tbody tr.row-ok td:first-child { border-left: 4px solid var(--success); }
        
        /* Empty State */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        
        .empty-state i {
            font-size: 48px;
            color: var(--border-color);
            margin-bottom: 16px;
        }
        
        .empty-state p {
            font-size: 16px;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1 class="header-title"><i class="fa-solid fa-chart-pie"></i> Reporte de Asignaciones</h1>
        
        <div class="kpi-container">
            <div class="kpi-card">
                <div class="kpi-title">Total Clases</div>
                <div class="kpi-value" id="kpi-total">0</div>
            </div>
            <div class="kpi-card kpi-success">
                <div class="kpi-title">Total Dictadas</div>
                <div class="kpi-value" id="kpi-dictadas">0</div>
            </div>
            <div class="kpi-card kpi-danger">
                <div class="kpi-title">Total Canceladas</div>
                <div class="kpi-value" id="kpi-canceladas">0</div>
            </div>
            <div class="kpi-card kpi-info">
                <div class="kpi-title">Tasa de Recuperación</div>
                <div class="kpi-value" id="kpi-recuperacion">0%</div>
            </div>
            <div class="kpi-card kpi-purple">
                <div class="kpi-title">Tasa de Dictadas</div>
                <div class="kpi-value" id="kpi-tasa-dictadas">0%</div>
            </div>
        </div>

        <div class="filters-container">
            <div class="filter-group">
                <label for="filter-id-grupo">Buscar por ID Grupo</label>
                <input type="text" id="filter-id-grupo" placeholder="Ej: MVD-123-5A">
            </div>
            <div class="filter-group">
                <label for="filter-estado-grupo">Estado del Grupo</label>
                <select id="filter-estado-grupo">
                    <option value="">Todos los estados</option>
                    <option value="1">Grupo Crítico (Rojo)</option>
                    <option value="2">Grupo en Recuperación (Amarillo)</option>
                    <option value="3">Grupo en Alerta (Naranja)</option>
                    <option value="4">Grupo Ok (Verde)</option>
                </select>
            </div>
            <button class="reset-btn" id="btn-reset">
                <i class="fa-solid fa-rotate-right"></i> Limpiar Búsqueda
            </button>
        </div>

        <div class="table-container">
            <table id="asignaciones-table">
                <thead>
                    <tr>
                        <th>ID Grupo</th>
                        <th>Docente Remoto</th>
                        <th>Mentor/a</th>
                        <th>Responsable Gestión</th>
                        <th>Rendimiento</th>
                        <th>Estado</th>
                    </tr>
                </thead>
                <tbody id="table-body">
                    <tr>
                        <td colspan="7" class="empty-state">
                            <i class="fa-solid fa-circle-notch fa-spin"></i>
                            <p>Esperando datos de Grist...</p>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
    <script src="reporte_grupo.js"></script>
</body>
</html>
