<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      padding: 20px;
      background-color: #f8f9fa;
      color: #333;
    }
    .widget-container {
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.05);
      max-width: 400px;
      margin: auto;
    }
    h3 {
      margin-top: 0;
      color: #16B378;
      font-size: 1.2rem;
      border-bottom: 2px solid #f0fbf7;
      padding-bottom: 10px;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #666;
      margin-bottom: 8px;
      text-transform: uppercase;
      font-weight: bold;
    }
    select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 8px;
      font-size: 1rem;
      background-color: #fff;
    }
    button {
      width: 100%;
      padding: 12px;
      background-color: #16B378;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background-color: #129161;
    }
    button:disabled {
      background-color: #ccc;
      cursor: not-allowed;
    }
    #status-msg {
      margin-top: 15px;
      font-size: 0.85rem;
      text-align: center;
    }
    .success { color: #16B378; }
    .error { color: #ef4444; }
  </style>
</head>
<body>

<div class="widget-container">
  <h3>Habilitar Liquidación DR</h3>
  
  <div class="form-group">
    <label for="period-select">Seleccionar Período</label>
    <select id="period-select">
      <option value="">Cargando períodos...</option>
    </select>
  </div>

  <button id="enable-btn" onclick="processLiquidation()">Habilitar Período</button>
  
  <div id="status-msg"></div>
</div>

<script src="habilitar_liq.js"></script>
</body>
</html>
